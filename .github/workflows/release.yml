name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must point to a commit on main."
            exit 1
          fi

      - name: Validate semver
        run: |
          if ! [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Tag is not valid semver: $GITHUB_REF_NAME"
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          cd "$HOME"
          go mod init tools
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run checks
        run: make check

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SECTION=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)
          if [ -z "$(echo "$SECTION" | tr -d '[:space:]')" ]; then
            echo "::error::No changelog entry found for version ${VERSION}."
            echo "Add a '## [${VERSION}]' section to CHANGELOG.md before tagging."
            exit 1
          fi
          {
            echo "body<<EOCHANGELOG"
            echo "$SECTION"
            echo "EOCHANGELOG"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes '${{ steps.changelog.outputs.body }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
