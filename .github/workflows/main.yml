name: Main

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          cd "$HOME"
          go mod init tools
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run checks
        run: make check
